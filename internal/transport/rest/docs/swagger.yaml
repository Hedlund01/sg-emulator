definitions:
  rest.AccountResponse:
    properties:
      balance:
        example: 100.5
        type: number
      id:
        example: 6c439a07c32f7fb09c29403d8d2e4e47b8c5e8a9
        type: string
      transactions:
        items:
          additionalProperties: true
          type: object
        type: array
    type: object
  rest.ErrorResponse:
    properties:
      error:
        example: Invalid request
        type: string
    type: object
  rest.HealthResponse:
    properties:
      status:
        example: ok
        type: string
      type:
        example: rest
        type: string
    type: object
  rest.SignedAuthorizeTokenTransferRequest:
    type: object
  rest.SignedBurnTokenRequest:
    type: object
  rest.SignedClawbackTokenRequest:
    type: object
  rest.SignedMintTokenRequest:
    type: object
  rest.SignedTransferRequest:
    type: object
  rest.SignedTransferTokenRequest:
    type: object
  rest.SignedUnauthorizeTokenTransferRequest:
    type: object
  rest.TransferResponse:
    properties:
      status:
        example: success
        type: string
    type: object
info:
  contact: {}
paths:
  /accounts/me:
    post:
      description: Get account details including balance and transaction history.
        Requires cryptographically signed request with Ed25519 signature and X.509
        certificate.
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.AccountResponse'
        "400":
          description: Invalid request body or missing signature
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "403":
          description: Attempting to access another account
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
        "404":
          description: Account not found
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Get your own account details
  /health:
    get:
      consumes:
      - application/json
      description: Get the health status of the REST API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.HealthResponse'
      summary: Health check
      tags:
      - health
  /tokens/authorize:
    post:
      consumes:
      - application/json
      description: Authorize a token to be transferred from an account. Must be called
        before /tokens/transfer. Requires a cryptographically signed request.
      parameters:
      - description: Signed authorize token transfer request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rest.SignedAuthorizeTokenTransferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.TransferResponse'
        "400":
          description: Invalid request or authorization failed
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Authorize a token transfer
      tags:
      - tokens
  /tokens/burn:
    post:
      consumes:
      - application/json
      description: Permanently destroy a token owned by an account. Requires a cryptographically
        signed request.
      parameters:
      - description: Signed burn token request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rest.SignedBurnTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.TransferResponse'
        "400":
          description: Invalid request or burn failed
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Burn a token
      tags:
      - tokens
  /tokens/clawback:
    post:
      consumes:
      - application/json
      description: Reclaim a token from an account using clawback authority. Must
        be signed by the clawback authority account (To). Requires a cryptographically
        signed request.
      parameters:
      - description: Signed clawback token request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rest.SignedClawbackTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.TransferResponse'
        "400":
          description: Invalid request or clawback failed
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Clawback a token
      tags:
      - tokens
  /tokens/mint:
    post:
      consumes:
      - application/json
      description: Mint a new token for an account. Requires a cryptographically signed
        request with Ed25519 signature.
      parameters:
      - description: Signed mint token request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rest.SignedMintTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.TransferResponse'
        "400":
          description: Invalid request or mint failed
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Mint a new token
      tags:
      - tokens
  /tokens/transfer:
    post:
      consumes:
      - application/json
      description: Transfer a token from one account to another. The token must first
        be authorized for transfer using /tokens/authorize. Requires a cryptographically
        signed request.
      parameters:
      - description: Signed transfer token request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rest.SignedTransferTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.TransferResponse'
        "400":
          description: Invalid request or transfer failed
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Transfer a token between accounts
      tags:
      - tokens
  /tokens/unauthorize:
    post:
      consumes:
      - application/json
      description: Revoke a previously authorized token transfer from an account.
        Requires a cryptographically signed request.
      parameters:
      - description: Signed unauthorize token transfer request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rest.SignedUnauthorizeTokenTransferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.TransferResponse'
        "400":
          description: Invalid request or unauthorization failed
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Unauthorize a token transfer
      tags:
      - tokens
  /transfer:
    post:
      consumes:
      - application/json
      description: Transfer funds from one account to another. Requires cryptographically
        signed request with Ed25519 signature.
      parameters:
      - description: Signed transfer request with Ed25519 signature
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/rest.SignedTransferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/rest.TransferResponse'
        "400":
          description: Invalid request, missing fields, or transfer failed
          schema:
            $ref: '#/definitions/rest.ErrorResponse'
      summary: Transfer funds between accounts
      tags:
      - transfer
swagger: "2.0"
